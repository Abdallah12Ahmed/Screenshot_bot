name: WhatsApp Crop Bot Scheduled Runner

on:
  schedule:
    # يفتح الساعة 12 بالليل بتوقيت مصر (9 مساءً بتوقيت جرينتش UTC)
    - cron: '0 21 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-telegram-bot==21.3 opencv-python-headless numpy==1.26.4

    - name: Run Telegram Bot with Timeout
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      # يغلق تلقائياً بعد 6 ساعات (21600 ثانية) ليقفل الساعة 6 صباحاً
      run: timeout 21600 python main.py || true
